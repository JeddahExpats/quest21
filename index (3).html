<style>
:root{
  --green:#0A3A28; --green-deep:#062719; --green-soft:#0E4732;
  --coral:#E15B57; --coral-dark:#C64743;
  --mint:#8FCBA0; --mint-bright:#57BE84;
  --cream:#FCEBD5; --cream-line:#F2DFC5;
  --paper:#FAF8F4; --ink:#123024; --muted:#5C6B62; --line:#E4E7E2;
  --shadow:0 6px 22px rgba(6,39,25,.10);
  --shadow-lg:0 14px 40px rgba(6,39,25,.18);
  --nav-h:66px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{
  font-family:'Nunito', system-ui, -apple-system, sans-serif;
  background:var(--paper); color:var(--ink);
  font-weight:600; line-height:1.45;
  overscroll-behavior-y:none;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select{font-family:inherit}
.display{font-family:'Anton','Arial Narrow',sans-serif; font-weight:400; letter-spacing:.5px; text-transform:uppercase}
:focus-visible{outline:3px solid var(--coral); outline-offset:2px; border-radius:6px}

/* ===== puzzle texture (used on dark surfaces) ===== */
.puzzle{position:relative; overflow:hidden}
.puzzle::before{
  content:""; position:absolute; inset:0;
  background-image:radial-gradient(circle at 12px 0,transparent 6px,var(--green-soft) 6.5px,transparent 7px);
  background-size:48px 48px; opacity:.35; pointer-events:none;
}

/* =====================  LOGIN  ===================== */
#login{
  position:fixed; inset:0; background:var(--green);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:26px 22px calc(26px + env(safe-area-inset-bottom)); text-align:center; z-index:40;
  overflow-y:auto;
}
.brand-mark{display:flex; align-items:center; gap:10px; margin-bottom:6px}
.logo21{width:46px;height:46px}
.brand-sub{color:var(--mint); font-size:11px; letter-spacing:3px; font-weight:800; text-transform:uppercase}
#login h1{font-size:clamp(40px,13vw,62px); color:var(--coral); margin:6px 0 2px; line-height:.92}
#login h1 .deg{color:var(--mint)}
.login-tag{color:#dff0e6; font-size:13px; letter-spacing:2px; text-transform:uppercase; font-weight:800; margin-bottom:26px}
.pick-label{color:var(--mint); font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px}
.tm-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:440px}
.tm-btn{
  background:#0E4732; border:2px solid rgba(143,203,160,.28); border-radius:18px;
  padding:16px 12px; color:#fff; display:flex; flex-direction:column; align-items:center; gap:8px;
  transition:transform .12s ease, border-color .12s ease, background .12s ease;
}
.tm-btn:active{transform:scale(.96)}
.tm-btn .dot{width:34px;height:34px;border-radius:50%; display:flex;align-items:center;justify-content:center; font-family:'Anton'; font-size:16px; color:#fff}
.tm-btn .nm{font-weight:800; font-size:16px}
.tm-btn .tm-team{font-size:11px; color:var(--mint); font-weight:700; letter-spacing:.5px; text-transform:uppercase}
.tm-btn.lead{grid-column:1 / -1; border-color:var(--coral); background:#12503a}

/* =====================  APP SHELL  ===================== */
#app{display:none; min-height:100vh; padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom))}
.topbar{
  position:sticky; top:0; z-index:20; background:var(--green); color:#fff;
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.topbar .who{display:flex; align-items:center; gap:10px; min-width:0}
.topbar .who .dot{width:32px;height:32px;border-radius:50%; display:flex;align-items:center;justify-content:center; font-family:'Anton'; font-size:14px; flex:0 0 auto}
.topbar .who .txt{min-width:0}
.topbar .who .nm{font-weight:800; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.topbar .who .role{font-size:11px; color:var(--mint); font-weight:700; text-transform:uppercase; letter-spacing:.5px}
.switch-btn{background:rgba(255,255,255,.12); border-radius:12px; padding:9px 12px; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; gap:6px}
.switch-btn:active{background:rgba(255,255,255,.22)}

.view{display:none; padding:16px 16px 8px; max-width:620px; margin:0 auto; animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}

.view-title{font-size:30px; color:var(--coral); margin:2px 0 2px}
.view-sub{color:var(--muted); font-size:13px; font-weight:700; margin-bottom:16px}

/* =====================  TEAM VIEW  ===================== */
.team-hero{
  border-radius:22px; padding:18px; color:#fff; position:relative; overflow:hidden;
  box-shadow:var(--shadow); margin-bottom:8px;
}
.team-hero .th-top{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:2}
.team-hero .th-label{font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; opacity:.9}
.team-hero .th-name{font-family:'Anton'; font-size:34px; line-height:.95; margin-top:2px}
.team-hero .th-score{text-align:right}
.team-hero .th-score .num{font-family:'Anton'; font-size:44px; line-height:.9}
.team-hero .th-score .lbl{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; opacity:.9}
.team-hero .th-rank{display:inline-flex; align-items:center; gap:6px; margin-top:12px; background:rgba(255,255,255,.18); padding:5px 11px; border-radius:20px; font-weight:800; font-size:13px; position:relative; z-index:2}

.roster{display:flex; flex-wrap:wrap; gap:6px; margin:12px 0 20px}
.roster .chip{background:#fff; border:1px solid var(--line); border-radius:20px; padding:5px 11px; font-size:12px; font-weight:700; box-shadow:0 1px 2px rgba(0,0,0,.03)}
.roster .chip.empty{color:var(--muted); font-style:italic}

/* progress dots */
.cp-track{display:flex; gap:6px; margin:0 0 18px; flex-wrap:wrap}
.cp-dot{width:30px;height:30px;border-radius:9px; background:var(--cream); border:1.5px dashed var(--cream-line); display:flex;align-items:center;justify-content:center; font-family:'Anton'; font-size:13px; color:#caa; transition:transform .3s cubic-bezier(.2,1.4,.5,1)}
.cp-dot.done{background:var(--mint-bright); border:1.5px solid var(--mint-bright); color:#fff; box-shadow:0 3px 8px rgba(87,190,132,.4)}
.cp-dot.running{background:#fff; border:1.5px solid var(--coral); color:var(--coral); animation:pulse 1.3s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(225,91,87,.35)} 50%{box-shadow:0 0 0 6px rgba(225,91,87,0)}}
@keyframes stamp{0%{transform:scale(0) rotate(-18deg); opacity:0} 60%{transform:scale(1.25) rotate(6deg)} 100%{transform:scale(1) rotate(0); opacity:1}}
.cp-dot.just-stamped{animation:stamp .5s cubic-bezier(.2,1.4,.5,1)}

/* challenge card */
.ch-card{background:#fff; border:1px solid var(--line); border-radius:18px; margin-bottom:12px; overflow:hidden; box-shadow:var(--shadow)}
.ch-head{display:flex; align-items:center; gap:12px; padding:14px 16px; width:100%; text-align:left}
.ch-num{width:38px;height:38px;border-radius:11px; background:var(--green); color:var(--mint); font-family:'Anton'; font-size:17px; display:flex;align-items:center;justify-content:center; flex:0 0 auto}
.ch-num.done{background:var(--mint-bright); color:#fff}
.ch-meta{flex:1; min-width:0}
.ch-meta .nm{font-family:'Anton'; font-size:19px; line-height:1}
.ch-meta .lo{font-size:12px; color:var(--muted); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.ch-right{text-align:right; flex:0 0 auto}
.ch-right .pts{font-family:'Anton'; font-size:22px; color:var(--ink)}
.ch-right .pts.zero{color:#c9cfca}
.ch-right .caret{font-size:12px; color:var(--muted); font-weight:800; margin-top:2px}
.time-badge{display:inline-block; font-size:11px; font-weight:800; padding:2px 8px; border-radius:20px; background:var(--cream); color:#a9762f; margin-top:3px}
.time-badge.over{background:#fde3e2; color:var(--coral-dark)}

.ch-body{display:none; padding:0 16px 16px; border-top:1px dashed var(--line)}
.ch-card.open .ch-body{display:block; animation:fade .2s ease}
.ch-card.open .caret{transform:rotate(180deg)}

/* timer block */
.timer-wrap{background:var(--green); border-radius:16px; padding:14px; color:#fff; margin:14px 0; text-align:center; position:relative; overflow:hidden}
.timer-clock{font-family:'Anton'; font-size:40px; line-height:1; letter-spacing:1px}
.timer-clock.over{color:#ffb3b0}
.timer-state{font-size:11px; text-transform:uppercase; letter-spacing:1.5px; font-weight:800; color:var(--mint); margin-bottom:6px}
.timer-times{display:flex; justify-content:center; gap:18px; margin-top:8px; font-size:12px; font-weight:700; color:#cfe6d8}
.timer-times b{color:#fff}
.timer-btns{display:flex; gap:10px; margin-top:12px}
.big-btn{flex:1; padding:14px; border-radius:14px; font-family:'Anton'; font-size:18px; letter-spacing:.5px; transition:transform .1s ease}
.big-btn:active{transform:scale(.97)}
.big-btn.start{background:var(--mint-bright); color:#fff}
.big-btn.stop{background:var(--coral); color:#fff}
.big-btn.ghost{background:rgba(255,255,255,.14); color:#fff; flex:0 0 auto; font-size:13px; font-family:'Nunito'; font-weight:800; padding:14px 16px}
.time-edit{display:none; gap:10px; margin-top:10px; justify-content:center}
.time-edit.show{display:flex}
.time-edit label{font-size:11px; color:#cfe6d8; font-weight:800; display:flex; flex-direction:column; gap:4px; text-align:left}
.time-edit input{border:none; border-radius:8px; padding:8px; font-weight:800; font-size:14px; background:#fff; color:var(--ink)}

/* scoring rows */
.score-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 0; border-bottom:1px solid var(--line)}
.score-row:last-child{border-bottom:none}
.score-row .sr-label{font-weight:700; font-size:14px}
.score-row .sr-hint{font-size:11px; color:var(--muted); font-weight:700}
.stepper{display:flex; align-items:center; gap:0; background:var(--paper); border:1px solid var(--line); border-radius:12px; overflow:hidden; flex:0 0 auto}
.stepper button{width:38px; height:38px; font-family:'Anton'; font-size:20px; color:var(--green); display:flex;align-items:center;justify-content:center}
.stepper button:active{background:var(--cream)}
.stepper .val{min-width:38px; text-align:center; font-weight:800; font-size:16px}
.toggle{width:52px; height:30px; border-radius:20px; background:var(--line); position:relative; transition:background .15s ease; flex:0 0 auto}
.toggle::after{content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.2); transition:transform .15s ease}
.toggle.on{background:var(--mint-bright)}
.toggle.on::after{transform:translateX(22px)}
.toggle.danger.on{background:var(--coral)}
.adj-row{display:flex; gap:8px; align-items:center; margin-top:4px}
.adj-row input[type=number]{width:70px; border:1px solid var(--line); border-radius:10px; padding:8px; font-weight:800; text-align:center}
.adj-row input[type=text]{flex:1; border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-weight:600; font-size:13px}
/* minus / type / plus stepper */
.type-stepper{display:flex; align-items:center; background:var(--paper); border:1px solid var(--line); border-radius:14px; overflow:hidden}
.type-stepper button{width:56px; height:48px; font-family:'Anton'; font-size:24px; color:var(--green); display:flex; align-items:center; justify-content:center; flex:0 0 auto}
.type-stepper button:active{background:var(--cream)}
.type-stepper .ts-input{flex:1; min-width:0; width:100%; text-align:center; border:none; background:transparent; font-weight:800; font-size:19px; color:var(--ink); padding:8px 2px; -moz-appearance:textfield; appearance:textfield}
.type-stepper .ts-input::-webkit-outer-spin-button,.type-stepper .ts-input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
.type-stepper .ts-input:focus{outline:none}
.reason-input{width:100%; border:1px solid var(--line); border-radius:12px; padding:11px 12px; font-weight:600; font-size:14px; background:var(--paper)}
.sub-total{display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:12px; border-top:2px solid var(--ink)}
.sub-total .lbl{font-family:'Anton'; font-size:16px}
.sub-total .num{font-family:'Anton'; font-size:26px; color:var(--coral)}
.reset-ch{margin-top:10px; width:100%; padding:10px; border-radius:10px; background:var(--paper); color:var(--muted); font-weight:800; font-size:12px; border:1px solid var(--line)}
.reset-ch:active{background:var(--cream)}

/* =====================  BONUS (team-level)  ===================== */
.card{background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow); margin-bottom:14px}
.card h3{font-family:'Anton'; font-size:19px; margin:0 0 4px; color:var(--green)}
.card .card-sub{font-size:12px; color:var(--muted); font-weight:700; margin-bottom:10px}

/* =====================  LEADERBOARD  ===================== */
.podium{display:flex; align-items:flex-end; gap:8px; margin:6px 0 18px; min-height:150px}
.pod{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px}
.pod .medal{font-size:22px}
.pod .pod-name{font-family:'Anton'; font-size:15px; text-align:center; line-height:1}
.pod .pod-score{font-weight:800; font-size:13px}
.pod .bar{width:100%; border-radius:12px 12px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:8px; color:#fff; font-family:'Anton'; font-size:20px; box-shadow:var(--shadow)}
.pod.p1 .bar{height:110px} .pod.p2 .bar{height:82px} .pod.p3 .bar{height:60px}

.lb-row{background:#fff; border:1px solid var(--line); border-radius:16px; margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden}
.lb-main{display:flex; align-items:center; gap:12px; padding:14px 16px; width:100%; text-align:left}
.lb-rank{font-family:'Anton'; font-size:24px; width:30px; text-align:center; color:var(--muted); flex:0 0 auto}
.lb-rank.top{color:var(--coral)}
.lb-badge{width:40px;height:40px;border-radius:12px; font-family:'Anton'; font-size:17px; color:#fff; display:flex;align-items:center;justify-content:center; flex:0 0 auto}
.lb-info{flex:1; min-width:0}
.lb-info .nm{font-family:'Anton'; font-size:18px; line-height:1}
.lb-info .prog{font-size:11px; color:var(--muted); font-weight:700; margin-top:3px}
.lb-total{font-family:'Anton'; font-size:26px; flex:0 0 auto}
.lb-detail{display:none; padding:0 16px 14px; border-top:1px dashed var(--line)}
.lb-row.open .lb-detail{display:block; animation:fade .2s ease}
.lb-line{display:flex; justify-content:space-between; padding:7px 0; font-size:13px; font-weight:700; border-bottom:1px solid var(--line)}
.lb-line:last-child{border-bottom:none}
.lb-line .v{font-family:'Anton'; font-size:15px}
.lb-line.neg .v{color:var(--coral)}
.lb-line.muted{color:#b8beb9}

/* =====================  RULES  ===================== */
.rule-item{display:flex; gap:12px; padding:13px 0; border-bottom:1px solid var(--line)}
.rule-item:last-child{border-bottom:none}
.rule-ic{width:30px;height:30px;border-radius:9px; background:var(--cream); color:var(--coral-dark); font-family:'Anton'; font-size:14px; display:flex;align-items:center;justify-content:center; flex:0 0 auto}
.rule-tx{font-weight:700; font-size:14px}
.rule-tx small{display:block; color:var(--muted); font-weight:700; font-size:12px; margin-top:2px}
.reminder{background:var(--green); color:#fff; border-radius:16px; padding:16px; margin-top:6px; text-align:center}
.reminder b{color:var(--mint)}

/* =====================  SETUP  ===================== */
.setup-sec{margin-bottom:8px}
.field{margin-bottom:12px}
.field label{display:block; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:5px}
.field input, .field textarea{width:100%; border:1px solid var(--line); border-radius:12px; padding:11px 12px; font-weight:700; font-size:14px; background:var(--paper)}
.field textarea{min-height:78px; resize:vertical; line-height:1.6}
.pt-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.pt-cell label{font-size:11px; font-weight:800; color:var(--muted); display:block; margin-bottom:4px}
.pt-cell input{width:100%; border:1px solid var(--line); border-radius:10px; padding:9px; font-weight:800; text-align:center}
.danger-btn{width:100%; padding:14px; border-radius:12px; background:#fde3e2; color:var(--coral-dark); font-weight:800; margin-top:8px; font-size:15px}
.danger-btn:active{background:#fbd3d1}
/* confirm modal */
.modal-back{position:fixed; inset:0; background:rgba(6,39,25,.55); z-index:90; display:none; align-items:center; justify-content:center; padding:24px; backdrop-filter:blur(2px)}
.modal-back.show{display:flex; animation:fade .18s ease}
.modal{background:#fff; border-radius:22px; padding:22px; max-width:380px; width:100%; box-shadow:var(--shadow-lg); animation:pop .2s cubic-bezier(.2,1.3,.5,1)}
@keyframes pop{from{transform:scale(.9); opacity:0} to{transform:scale(1); opacity:1}}
.modal-title{font-size:26px; color:var(--coral); margin-bottom:8px}
.modal-body{font-weight:700; font-size:14px; color:var(--ink); line-height:1.5; margin-bottom:20px}
.modal-actions{display:flex; gap:10px}
.modal-actions button{flex:1; padding:14px; border-radius:14px; font-weight:800; font-size:15px}
.modal-cancel{background:var(--paper); color:var(--ink); border:1px solid var(--line)}
.modal-cancel:active{background:var(--cream)}
.modal-confirm{background:var(--coral); color:#fff}
.modal-confirm:active{background:var(--coral-dark)}
.save-note{font-size:12px; color:var(--muted); font-weight:700; text-align:center; margin-top:12px}

/* =====================  BOTTOM NAV  ===================== */
.nav{
  position:fixed; left:0; right:0; bottom:0; z-index:30; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:#fff; border-top:1px solid var(--line); display:flex; box-shadow:0 -4px 20px rgba(6,39,25,.06);
}
.nav button{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--muted); font-weight:800; font-size:9.5px; letter-spacing:.2px; padding:0 2px}
.nav button svg{width:21px; height:21px}
.nav button.active{color:var(--coral)}
.nav button.active svg{stroke:var(--coral)}

/* =====================  STATS PAGE  ===================== */
.stat-hero{background:var(--green); border-radius:20px; padding:18px; color:#fff; text-align:center; margin-bottom:14px; position:relative; overflow:hidden}
.stat-hero .sh-emoji{font-size:34px}
.stat-hero .sh-title{font-family:'Anton'; font-size:22px; margin:4px 0 2px}
.stat-hero .sh-sub{font-size:12px; color:var(--mint); font-weight:800; text-transform:uppercase; letter-spacing:1px}
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
.stat-card{background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:var(--shadow)}
.stat-card.wide{grid-column:1 / -1}
.stat-card .sc-emoji{font-size:22px}
.stat-card .sc-label{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:4px 0 2px}
.stat-card .sc-team{font-family:'Anton'; font-size:19px; line-height:1.05}
.stat-card .sc-detail{font-size:12px; font-weight:700; color:var(--coral); margin-top:2px}
.stat-card.empty-stat .sc-team{color:#c9cfca; font-size:15px}

<script>
/* =====================================================================
   THE 21° QUEST — TASKMASTER SCOREBOARD
   Vanilla JS. Local-first, upgrades to live Firebase sync automatically.
   ===================================================================== */

/* ---------- Challenge definitions (order = play order) ---------- */
const CHALLENGES = [
  {id:'c1', name:'Showroom',    loc:'Hyundai Showroom',       limit:15, bonus:{type:'toggle', key:'proof',      label:'Business card / physical proof', ptsKey:'proof'}},
  {id:'c2', name:'Odyssey',     loc:'VOX Cinemas',            limit:10, bonus:{type:'toggle', key:'noFullTeam', label:'Whole team NOT in the photo',   ptsKey:'noFullTeam', danger:true}},
  {id:'c3', name:'Daiso',       loc:'Daiso / Mumuso / Miniso',limit:15, bonus:{type:'count',  key:'sarSaved',   label:'SAR saved (of 10)',  perKey:'daisoPerSar', max:10}},
  {id:'c4', name:'Danube',      loc:'Danube',                 limit:15, bonus:{type:'count',  key:'categories', label:'Categories photographed', perKey:'danubePerCat', max:10}},
  {id:'c5', name:'Arcade',      loc:'Arcade',                 limit:15, bonus:{type:'toggle', key:'beatMod',    label:'Beat the moderator', ptsKey:'arcadeWin'}},
  {id:'c6', name:'SAR 21 Hunt', loc:'The whole mall',         limit:30, bonus:{type:'count',  key:'items21',    label:'Items priced SAR 21', perKey:'sar21PerItem', max:99}},
  {id:'c7', name:'Find the CC', loc:'Final destination',      limit:15, bonus:null}
];

/* ---------- Default point values (all editable in Setup) ---------- */
const DEFAULT_POINTS = {
  base:[50,40,30,20,10],   // by finish rank per challenge
  hint:5,                  // deducted per hint
  timeOver:5,              // deducted if over the time limit
  proof:5,                 // Showroom bonus
  noFullTeam:5,            // Odyssey deduction (applied as minus)
  daisoPerSar:1,           // Daiso: per SAR saved
  danubePerCat:1,          // Danube: per category
  arcadeWin:10,            // Arcade: beat the mod  (slide said +2 — editable here)
  sar21PerItem:10,         // SAR 21 hunt: per item
  ccPerMember:1,           // per core-committee video
  sub:{ toilet:1, icecream:1, fiveLetterStore:1, danubeLetters:1, groupPhoto:1, matchTesters:1 }
};

/* ---------- Team-level bonus sub-challenges ---------- */
const SUBS = [
  {key:'toilet',          label:'Selfie in the toilet',                     hint:'1 pt'},
  {key:'icecream',        label:'Ice-cream sample pic before eating',       hint:'1 pt'},
  {key:'fiveLetterStore', label:'Team photo at 5-letter-name stores',       hint:'1 pt each', count:true, max:20},
  {key:'danubeLetters',   label:'Danube product for every letter in names', hint:'1 pt'},
  {key:'groupPhoto',      label:'Ask someone to take your group photo',     hint:'1 pt · ×2 if selfie', selfie:true},
  {key:'matchTesters',    label:'3 paper testers from MATCH (named)',       hint:'1 pt'}
];

/* ---------- Default config (pre-seeded, all editable) ---------- */
const DEFAULT_CONFIG = {
  points: DEFAULT_POINTS,
  teams: {
    A:{name:'Team A', color:'#E15B57', taskmaster:'Abdullah', roster:['Rishi Jain','Syed Ahmed','Murtaza Raees','Fdhael Ali','Alaa Alsawadi']},
    B:{name:'Team B', color:'#2FA36B', taskmaster:'Imad',     roster:['M. Shaban Shazad','Usman Akram','Zain Imran','Noor','Amtul Shaafi Hanaa']},
    C:{name:'Team C', color:'#E0A458', taskmaster:'Taseen',   roster:['Ibrahim Irfan Syed','Akram Barnawi','Ahmad Noor','Farhin Islam','Hanan']},
    D:{name:'Team D', color:'#5B8DEF', taskmaster:'Sarah N.', roster:['Zaki Ahmed','Talha Waheed','Abdulmalik Mahmood','Mohammed Abdulla','Aysha']},
    E:{name:'Team E', color:'#B061C9', taskmaster:'Sara H.',  roster:['Ahmed Irfan','Osama Khan','Afaak Qureshi','Malahat Zafar','Madina Zafar']}
  },
  lead:'Lead / Roaming'   // 6th taskmaster — sees & edits everything
};

const TEAM_IDS = ['A','B','C','D','E'];

/* ---------- State ---------- */
let CONFIG = clone(DEFAULT_CONFIG);
let SCORES = {};            // { A:{ ch:{c1:{...}}, bonus:{...} }, ... }
let ME = null;              // { name, team|null, isLead }
let currentView = 'team';
let tickTimer = null;
let db = null, LIVE = false, dbRef = null;
// spectator / team link:  add ?tv (or ?screen) to the URL for a read-only live board
const SPECTATOR = /[?&](tv|screen|board)\b/.test(location.search) || location.hash==='#tv';

/* ---------- Safe localStorage (won't crash in sandboxes) ---------- */
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

function clone(o){ return JSON.parse(JSON.stringify(o)); }
function blankTeamScore(){
  const ch={}; CHALLENGES.forEach(c=>{ ch[c.id]={start:null,end:null,hints:0,timeOverOff:false,extra:0,extraNote:'',bonus:0,bonusOn:false,selfie:false}; });
  return { ch, bonus:{ sub:{}, ccVideos:0, modPoints:0 } };
}
function ensureScores(){
  TEAM_IDS.forEach(t=>{ if(!SCORES[t]) SCORES[t]=blankTeamScore(); });
}

/* =====================================================================
   DATA LAYER  (local first; live if Firebase config present)
   ===================================================================== */
function initData(){
  const hasCfg = FIREBASE_CONFIG && FIREBASE_CONFIG.databaseURL;
  if(hasCfg && typeof firebase !== 'undefined'){
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      dbRef = db.ref('quest21');
      LIVE = true;
      dbRef.on('value', snap=>{
        const data = snap.val() || {};
        if(data.config) CONFIG = mergeConfig(data.config);
        SCORES = data.scores || {};
        ensureScores();
        if(!data.config){ pushConfig(); }
        renderAll();
      });
      setConn('live','● Live — synced');
      return;
    }catch(e){ console.warn('Firebase failed, using local mode', e); }
  }
  // local mode
  LIVE = false;
  const saved = lsGet('quest21');
  if(saved){ try{ const d=JSON.parse(saved); CONFIG=mergeConfig(d.config||{}); SCORES=d.scores||{}; }catch(e){} }
  ensureScores();
  setConn('local','● On this device only');
}
function mergeConfig(c){
  const base = clone(DEFAULT_CONFIG);
  if(c.lead) base.lead = c.lead;
  if(c.points) base.points = Object.assign({}, DEFAULT_POINTS, c.points, {sub:Object.assign({}, DEFAULT_POINTS.sub, c.points.sub||{}), base:c.points.base||DEFAULT_POINTS.base});
  if(c.teams){ TEAM_IDS.forEach(t=>{ if(c.teams[t]) base.teams[t]=Object.assign({}, base.teams[t], c.teams[t]); }); }
  return base;
}
function saveLocal(){ if(!LIVE) lsSet('quest21', JSON.stringify({config:CONFIG, scores:SCORES})); }

function pushScores(){
  if(LIVE && dbRef){ dbRef.child('scores').set(SCORES); }
  else { saveLocal(); }
}
function pushConfig(){
  if(LIVE && dbRef){ dbRef.child('config').set(CONFIG); }
  else { saveLocal(); }
}
function setConn(cls,txt){ const p=document.getElementById('connPill'); p.className='conn-pill '+cls; p.textContent=txt; }

/* =====================================================================
   SCORING ENGINE
   ===================================================================== */
function elapsedMs(cs){ if(cs&&cs.start&&cs.end) return Math.max(0, cs.end-cs.start); return null; }
function elapsedMin(cs){ const ms=elapsedMs(cs); return ms==null?null:ms/60000; }

// finish-rank base points for each team on each challenge (only teams that finished)
function baseByRank(){
  const out={}; TEAM_IDS.forEach(t=>out[t]={});
  CHALLENGES.forEach(c=>{
    const finished=[];
    TEAM_IDS.forEach(t=>{ const cs=SCORES[t]?.ch?.[c.id]; const ms=elapsedMs(cs); if(ms!=null) finished.push({t,ms}); });
    finished.sort((a,b)=>a.ms-b.ms);
    finished.forEach((f,i)=>{ out[f.t][c.id] = CONFIG.points.base[i] ?? CONFIG.points.base[CONFIG.points.base.length-1]; });
  });
  return out;
}

function challengeBonus(c, cs){
  if(!c.bonus || !cs) return 0;
  const P=CONFIG.points;
  if(c.bonus.type==='toggle'){
    if(!cs.bonusOn) return 0;
    const v = P[c.bonus.ptsKey] || 0;
    return c.bonus.danger ? -v : v;
  }
  if(c.bonus.type==='count'){
    return (cs.bonus||0) * (P[c.bonus.perKey]||0);
  }
  return 0;
}

function challengeScore(c, cs, base){
  const P=CONFIG.points;
  let pts = base||0;
  pts += challengeBonus(c, cs);
  pts -= (cs.hints||0) * P.hint;
  const over = isOver(c, cs) && !cs.timeOverOff;
  if(over) pts -= P.timeOver;
  pts += (cs.extra||0);
  return pts;
}
function isOver(c, cs){ const m=elapsedMin(cs); return m!=null && m > c.limit; }

function teamBonusScore(t){
  const b = SCORES[t]?.bonus || {sub:{},ccVideos:0,modPoints:0};
  const P=CONFIG.points; let pts=0;
  SUBS.forEach(s=>{
    const raw = b.sub?.[s.key];
    if(s.count){ pts += (raw||0) * (P.sub[s.key]||1); }
    else if(s.selfie){ if(raw){ pts += (P.sub[s.key]||1) * (b.sub?.[s.key+'_selfie'] ? 2 : 1); } }
    else { if(raw) pts += (P.sub[s.key]||1); }
  });
  pts += (b.ccVideos||0) * P.ccPerMember;
  pts += (b.modPoints||0);
  return pts;
}

function teamTotal(t, baseMap){
  let total=0;
  CHALLENGES.forEach(c=>{ total += challengeScore(c, SCORES[t].ch[c.id], baseMap[t][c.id]||0); });
  total += teamBonusScore(t);
  return total;
}
function teamBreakdown(t, baseMap){
  const lines=[]; let done=0;
  CHALLENGES.forEach(c=>{
    const cs=SCORES[t].ch[c.id];
    const finished = elapsedMs(cs)!=null;
    if(finished) done++;
    const val = finished ? challengeScore(c,cs,baseMap[t][c.id]||0) : null;
    lines.push({label:c.name, val, muted:!finished});
  });
  const bonus=teamBonusScore(t);
  lines.push({label:'Bonuses', val:bonus, muted:false, bonus:true});
  return {lines, done};
}

/* =====================================================================
   LOGIN
   ===================================================================== */
function renderLogin(){
  const grid=document.getElementById('tmGrid');
  grid.innerHTML='';
  TEAM_IDS.forEach(t=>{

function login(who){
  ME=who; lsSet('quest21_me', JSON.stringify(who));
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  const dot=document.getElementById('topDot');

  document.getElementById('topName').textContent=who.name;
  document.getElementById('topRole').textContent = who.isLead ? 'Lead taskmaster' : CONFIG.teams[who.team].name;

}
function logout(){
  ME=null; lsSet('quest21_me','');
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  renderLogin();
}

function go(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
  window.scrollTo(0,0);
  saveUI();
  renderView(v);
}
function saveUI(){ try{ lsSet('quest21_ui', JSON.stringify({view:currentView, leadTeam, openChallenge})); }catch(e){} }
function restoreUI(){
  try{
    const s=JSON.parse(lsGet('quest21_ui')||'{}');
    if(s.leadTeam && ME && ME.isLead) leadTeam=s.leadTeam;
    if(s.openChallenge) openChallenge=s.openChallenge;
    if(s.view && document.getElementById('view-'+s.view)) go(s.view);
  }catch(e){}
}
function renderAll(){ if(SPECTATOR){ renderSpectator(); return; } if(!ME) return; renderView(currentView); }
function renderView(v){
  if(v==='team') renderTeam();
  else if(v==='board') renderBoard();
  else if(v==='stats') renderStats();
  else if(v==='rules') renderRules();
  else if(v==='setup') renderSetup();
}

let openChallenge = null;
let leadTeam = null;   // which team the Lead is currently editing (null = All Teams list)
function teamsIManage(){ return ME.isLead ? TEAM_IDS.slice() : [ME.team]; }

function renderTeam(){

  const baseMap=baseByRank();

    // lead: pick which team to edit
    let html=`<h2 class="view-title display">All Teams</h2><div class="view-sub">Tap a team to log its scores</div>`;
    TEAM_IDS.forEach(t=>{
      const tm=CONFIG.teams[t]; const bd=teamBreakdown(t,baseMap); const total=teamTotal(t,baseMap);
      html+=`<button class="lb-row open" style="width:100%;text-align:left" onclick="leadEdit('${t}')">
        <div class="lb-main">
          <div class="lb-badge" style="background:${tm.color}">${t}</div>
          <div class="lb-info"><div class="nm">${esc(tm.name)}</div><div class="prog">${esc(tm.taskmaster||'')} · ${bd.done}/7 checkpoints</div></div>
          <div class="lb-total">${total}</div>
        </div></button>`;

function leadEdit(t){ leadTeam=t; saveUI(); renderView('team'); window.scrollTo(0,0); }
function leadBack(){ leadTeam=null; openChallenge=null; saveUI(); renderView('team'); window.scrollTo(0,0); }

function teamPanel(t, baseMap){
  const tm=CONFIG.teams[t];
  const total=teamTotal(t,baseMap);
  const ranks=rankTeams(baseMap);
  const myRank=ranks.findIndex(r=>r.t===t)+1;
  const bd=teamBreakdown(t,baseMap);
  const medal = myRank===1?'🥇':myRank===2?'🥈':myRank===3?'🥉':'#'+myRank;

  let dots='';
  CHALLENGES.forEach((c,i)=>{
    const cs=SCORES[t].ch[c.id];
    const done=elapsedMs(cs)!=null;
    const running=cs.start && !cs.end;
    dots+=`<div class="cp-dot ${done?'done':running?'running':''}">${done?'✓':(i+1)}</div>`;
  });

  let roster = tm.roster && tm.roster.length
    ? tm.roster.map(n=>`<span class="chip">${esc(n)}</span>`).join('')
    : `<span class="chip empty">No members yet — add them in Setup</span>`;

  let cards='';
  CHALLENGES.forEach((c,i)=>{ cards+=challengeCard(t,c,i,baseMap); });

  return `
    <div class="team-hero puzzle" style="background:${tm.color}">
      <div class="th-top">
        <div><div class="th-label">${esc(tm.taskmaster||'Taskmaster')}</div><div class="th-name">${esc(tm.name)}</div></div>
        <div class="th-score"><div class="num">${total}</div><div class="lbl">points</div></div>
      </div>
      <div class="th-rank">${medal} <span>Rank ${myRank} of 5 · ${bd.done}/7 done</span></div>
    </div>
    <div class="roster">${roster}</div>
    <div class="cp-track">${dots}</div>
    <h3 class="display" style="font-size:20px;color:var(--green);margin:4px 0 10px">Checkpoints</h3>
    ${cards}
    ${bonusPanel(t)}
    <button class="brag-btn" onclick="showBrag('${t}')">🔥 View ${esc(tm.name)}'s brag card</button>
    <div class="card" style="border-color:#f3d3d1;background:#fffafa">
      <h3 style="color:var(--coral-dark)">Reset team</h3>
      <div class="card-sub">Clears every time &amp; point for ${esc(tm.name)} — needs confirmation</div>
      <button class="danger-btn" style="margin-top:2px" onclick="resetTeam('${t}')">Reset ${esc(tm.name)}'s scores</button>
    </div>
    <div class="footer-note">Taskmaster: ${esc(ME.name)} · ${LIVE?'Live sync on':'Local mode'}</div>
  `;
}

function challengeCard(t,c,i,baseMap){
  const cs=SCORES[t].ch[c.id];
  const finished=elapsedMs(cs)!=null;
  const running=cs.start && !cs.end;
  const score = finished ? challengeScore(c,cs,baseMap[t][c.id]||0) : null;
  const em=elapsedMin(cs);
  const over=isOver(c,cs);
  const open = openChallenge===c.id;

  let timeBadge='';
  if(finished){ timeBadge=`<span class="time-badge ${over?'over':''}">${fmtDur(elapsedMs(cs))}${over?' · over':''}</span>`; }
  else if(running){ timeBadge=`<span class="time-badge">running…</span>`; }
  else { timeBadge=`<span class="time-badge" style="background:#eef1ee;color:#8a938c">limit ${c.limit}m</span>`; }

  return `
  <div class="ch-card ${open?'open':''}" id="card-${t}-${c.id}">
    <button class="ch-head" onclick="toggleCard('${c.id}')">
      <div class="ch-num ${finished?'done':''}">${finished?'✓':(i+1)}</div>
      <div class="ch-meta"><div class="nm">${c.name}</div><div class="lo">${esc(c.loc)}</div>${timeBadge}</div>
      <div class="ch-right">
        <div class="pts ${score===null?'zero':''}">${score===null?'–':score}</div>
        <div class="caret">▾</div>
      </div>
    </button>
    <div class="ch-body">
      ${timerBlock(t,c)}
      ${scoringBlock(t,c,baseMap)}
    </div>
  </div>`;
}

function timerBlock(t,c){
  const cs=SCORES[t].ch[c.id];
  const running=cs.start && !cs.end;
  const finished=cs.start && cs.end;
  let clock='00:00', over=false;
  if(finished){ clock=fmtDur(elapsedMs(cs)); over=isOver(c,cs); }
  else if(running){ clock=fmtDur(Date.now()-cs.start); over=(Date.now()-cs.start)/60000>c.limit; }
  const state = finished?'Completed':running?'In progress':'Not started';

  let btns='';
  if(!cs.start){ btns=`<button class="big-btn start" onclick="startCh('${t}','${c.id}')">▶ Start</button>`; }
  else if(!cs.end){ btns=`<button class="big-btn stop" onclick="stopCh('${t}','${c.id}')">■ Stop</button>
    <button class="big-btn ghost" onclick="toggleEdit('${t}','${c.id}')">Edit</button>`; }
  else { btns=`<button class="big-btn ghost" style="flex:1" onclick="toggleEdit('${t}','${c.id}')">Edit times</button>`; }

  return `
  <div class="timer-wrap" id="timer-${t}-${c.id}" data-limit="${c.limit}">
    <div class="timer-state">${state} · limit ${c.limit} min</div>
    <div class="timer-clock ${over?'over':''}" id="clock-${t}-${c.id}">${clock}</div>
    <div class="timer-times"><span>Start <b>${cs.start?fmtClock(cs.start):'—'}</b></span><span>End <b>${cs.end?fmtClock(cs.end):'—'}</b></span></div>
    <div class="timer-btns">${btns}</div>
    <div class="time-edit" id="edit-${t}-${c.id}">
      <label>Start<input type="time" value="${cs.start?toTimeInput(cs.start):''}" onchange="editTime('${t}','${c.id}','start',this.value)"></label>
      <label>End<input type="time" value="${cs.end?toTimeInput(cs.end):''}" onchange="editTime('${t}','${c.id}','end',this.value)"></label>
    </div>
  </div>`;
}

function scoringBlock(t,c,baseMap){
  const cs=SCORES[t].ch[c.id];
  const P=CONFIG.points;
  const base=baseMap[t][c.id];
  const finished=elapsedMs(cs)!=null;
  let rows='';

  // base (rank) — read only
  rows+=`<div class="score-row"><div><div class="sr-label">Finish points</div><div class="sr-hint">${finished?'Auto by speed rank':'Awarded when you Stop'}</div></div>
    <div class="pts" style="font-family:'Anton';font-size:20px;color:${finished?'var(--green)':'#c9cfca'}">${finished?'+'+(base||0):'–'}</div></div>`;

  // challenge-specific bonus
  if(c.bonus){
    if(c.bonus.type==='toggle'){
      const on=cs.bonusOn;
      const v=P[c.bonus.ptsKey]||0;
      rows+=`<div class="score-row"><div><div class="sr-label">${c.bonus.label}</div><div class="sr-hint">${c.bonus.danger?'−':'+'}${v} pts</div></div>
        <div class="toggle ${c.bonus.danger?'danger':''} ${on?'on':''}" onclick="toggleBonus('${t}','${c.id}')" role="switch" aria-checked="${on}" tabindex="0"></div></div>`;
    } else if(c.bonus.type==='count'){
      const val=cs.bonus||0;
      rows+=`<div class="score-row"><div><div class="sr-label">${c.bonus.label}</div><div class="sr-hint">+${P[c.bonus.perKey]} pt each = +${val*(P[c.bonus.perKey]||0)}</div></div>
        <div class="stepper"><button onclick="stepBonus('${t}','${c.id}',-1)">−</button><span class="val">${val}</span><button onclick="stepBonus('${t}','${c.id}',1)">+</button></div></div>`;
    }
  }

  // hints
  rows+=`<div class="score-row"><div><div class="sr-label">Hints used</div><div class="sr-hint">−${P.hint} pts each</div></div>
    <div class="stepper"><button onclick="stepHint('${t}','${c.id}',-1)">−</button><span class="val">${cs.hints||0}</span><button onclick="stepHint('${t}','${c.id}',1)">+</button></div></div>`;

  // time-over toggle (auto)
  if(isOver(c,cs)){
    rows+=`<div class="score-row"><div><div class="sr-label">Over time limit</div><div class="sr-hint">${cs.timeOverOff?'Penalty waived':'−'+P.timeOver+' pts'}</div></div>
      <div class="toggle danger ${cs.timeOverOff?'':'on'}" onclick="toggleOver('${t}','${c.id}')" role="switch" tabindex="0"></div></div>`;
  }

  // manual adjust
  rows+=`<div class="score-row" style="flex-direction:column;align-items:stretch;gap:10px">
    <div class="sr-label">Manual adjustment <span class="sr-hint" style="display:inline">(e.g. half-points, judge call · tap −/+ or type)</span></div>
    <div class="type-stepper">
      <button onclick="stepExtra('${t}','${c.id}',-1)" aria-label="minus one">−</button>
      <input type="number" inputmode="numeric" pattern="-?[0-9]*" class="ts-input" value="${cs.extra||0}" onchange="setExtra('${t}','${c.id}',this.value)" aria-label="adjustment points">
      <button onclick="stepExtra('${t}','${c.id}',1)" aria-label="plus one">+</button>
    </div>
    <input type="text" class="reason-input" placeholder="reason (optional)" value="${esc(cs.extraNote||'')}" onchange="setExtraNote('${t}','${c.id}',this.value)"></div>`;

  const sub = finished ? challengeScore(c,cs,base) : (challengeScore(c,cs,0));
  rows+=`<div class="sub-total"><div class="lbl">Checkpoint total</div><div class="num">${finished?sub:'pending'}</div></div>`;
  rows+=`<button class="reset-ch" onclick="resetCh('${t}','${c.id}')">Reset this checkpoint</button>`;
  return rows;
}

function bonusPanel(t){
  const b=SCORES[t].bonus||{sub:{},ccVideos:0,modPoints:0};
  const P=CONFIG.points;
  let subRows='';
  SUBS.forEach(s=>{
    if(s.count){
      const v=b.sub?.[s.key]||0;
      subRows+=`<div class="score-row"><div><div class="sr-label">${s.label}</div><div class="sr-hint">${s.hint}</div></div>
        <div class="stepper"><button onclick="stepSub('${t}','${s.key}',-1)">−</button><span class="val">${v}</span><button onclick="stepSub('${t}','${s.key}',1)">+</button></div></div>`;
    } else if(s.selfie){
      const on=!!b.sub?.[s.key]; const sel=!!b.sub?.[s.key+'_selfie'];
      subRows+=`<div class="score-row"><div><div class="sr-label">${s.label}</div><div class="sr-hint">${s.hint}${on&&sel?' → ×2 on':''}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          ${on?`<button class="reset-ch" style="width:auto;margin:0;padding:6px 10px;${sel?'background:var(--mint-bright);color:#fff;border-color:var(--mint-bright)':''}" onclick="toggleSelfie('${t}','${s.key}')">selfie</button>`:''}
          <div class="toggle ${on?'on':''}" onclick="toggleSub('${t}','${s.key}')" role="switch" tabindex="0"></div>
        </div></div>`;
    } else {
      const on=!!b.sub?.[s.key];
      subRows+=`<div class="score-row"><div><div class="sr-label">${s.label}</div><div class="sr-hint">${s.hint}</div></div>
        <div class="toggle ${on?'on':''}" onclick="toggleSub('${t}','${s.key}')" role="switch" tabindex="0"></div></div>`;
    }
  });

  return `
  <div class="card" style="margin-top:18px">
    <h3>Bonus Sub-Challenges</h3>
    <div class="card-sub">Team-only mini tasks · 1 point each</div>
    ${subRows}
    <div class="score-row"><div><div class="sr-label">Core-committee videos</div><div class="sr-hint">+${P.ccPerMember} pt each · 7 members</div></div>
      <div class="stepper"><button onclick="stepCC('${t}',-1)">−</button><span class="val">${b.ccVideos||0}</span><button onclick="stepCC('${t}',1)">+</button></div></div>
    <div class="score-row"><div><div class="sr-label">Moderator bonus games</div><div class="sr-hint">Printed-card games · 1–5 pts</div></div>
      <div class="type-stepper" style="max-width:160px;flex:0 0 auto">
        <button onclick="stepMod('${t}',-1)" aria-label="minus one">−</button>
        <input type="number" inputmode="numeric" class="ts-input" value="${b.modPoints||0}" onchange="setMod('${t}',this.value)" aria-label="mod points">
        <button onclick="stepMod('${t}',1)" aria-label="plus one">+</button>
      </div></div>
    <div class="sub-total"><div class="lbl">Bonus total</div><div class="num">${teamBonusScore(t)}</div></div>
  </div>`;
}

/* ---------- team-view bindings & actions ---------- */
function bindTeamPanel(t){ startTick(); }
function toggleCard(id){ openChallenge = (openChallenge===id?null:id); saveUI(); renderView('team'); }

function startCh(t,cid){ SCORES[t].ch[cid].start=Date.now(); SCORES[t].ch[cid].end=null; commit(); toast('Timer started ⏱'); }
function stopCh(t,cid){
  const cs=SCORES[t].ch[cid]; cs.end=Date.now();
  commit(); stampDot(t,cid); toast('Checkpoint stamped ✓');
}
function toggleEdit(t,cid){ const e=document.getElementById(`edit-${t}-${cid}`); if(e) e.classList.toggle('show'); }
function editTime(t,cid,which,val){
  if(!val){ SCORES[t].ch[cid][which]=null; commit(); return; }
  const [h,m]=val.split(':').map(Number);
  const d=new Date(); d.setHours(h,m,0,0);
  SCORES[t].ch[cid][which]=d.getTime();
  commit();
}
function toggleBonus(t,cid){ const cs=SCORES[t].ch[cid]; cs.bonusOn=!cs.bonusOn; commit(); }
function stepBonus(t,cid,d){ const cs=SCORES[t].ch[cid]; const c=CHALLENGES.find(x=>x.id===cid); cs.bonus=clampN((cs.bonus||0)+d,0,c.bonus.max||99); commit(); }
function stepHint(t,cid,d){ const cs=SCORES[t].ch[cid]; cs.hints=clampN((cs.hints||0)+d,0,20); commit(); }
function toggleOver(t,cid){ const cs=SCORES[t].ch[cid]; cs.timeOverOff=!cs.timeOverOff; commit(); }
function setExtra(t,cid,v){ SCORES[t].ch[cid].extra=Math.round(Number(v)||0); commit(); }
function stepExtra(t,cid,d){ const cs=SCORES[t].ch[cid]; cs.extra=Math.round((cs.extra||0)+d); commit(); }
function setExtraNote(t,cid,v){ SCORES[t].ch[cid].extraNote=v; commit(true); }
function resetCh(t,cid){
  if(!confirm('Reset this checkpoint? Times and points will be cleared.')) return;
  const bt=blankTeamScore(); SCORES[t].ch[cid]=bt.ch[cid]; commit(); toast('Checkpoint reset');
}
function toggleSub(t,key){ const b=SCORES[t].bonus; b.sub=b.sub||{}; b.sub[key]=!b.sub[key]; commit(); }
function toggleSelfie(t,key){ const b=SCORES[t].bonus; b.sub[key+'_selfie']=!b.sub[key+'_selfie']; commit(); }
function stepSub(t,key,d){ const b=SCORES[t].bonus; b.sub=b.sub||{}; b.sub[key]=clampN((b.sub[key]||0)+d,0,30); commit(); }
function stepCC(t,d){ const b=SCORES[t].bonus; b.ccVideos=clampN((b.ccVideos||0)+d,0,7); commit(); }
function setMod(t,v){ SCORES[t].bonus.modPoints=Math.max(0,Math.round(Number(v)||0)); commit(); }
function stepMod(t,d){ const b=SCORES[t].bonus; b.modPoints=Math.max(0,Math.round((b.modPoints||0)+d)); commit(); }
function resetTeam(t){
  const tm=CONFIG.teams[t];
  openConfirm('Reset '+tm.name+'?',
    'This clears every checkpoint time, bonus and point for '+tm.name+'. It cannot be undone.',
    'Reset team',
    ()=>{ SCORES[t]=blankTeamScore(); pushScores(); toast(tm.name+' reset'); renderView('team'); });
}

function commit(silent){
  pushScores();
  if(!silent){ renderView('team'); }
}
function stampDot(t,cid){
  // re-render then animate the newly completed dot
  renderView('team');
  requestAnimationFrame(()=>{
    const dots=document.querySelectorAll('#view-team .cp-dot.done');
    const idx=CHALLENGES.findIndex(c=>c.id===cid);
    if(dots[Math.min(idx,dots.length-1)]) dots[Math.min(idx,dots.length-1)].classList.add('just-stamped');
  });
}

/* live ticking timers */
function startTick(){
  if(tickTimer) return;
  tickTimer=setInterval(()=>{
    document.querySelectorAll('.timer-clock').forEach(el=>{
      const id=el.id.replace('clock-',''); const [t,cid]=id.split('-');
      const cs=SCORES[t]?.ch?.[cid]; if(cs&&cs.start&&!cs.end){
        const ms=Date.now()-cs.start; el.textContent=fmtDur(ms);
        const lim=Number(el.closest('.timer-wrap').dataset.limit)||99;
        el.classList.toggle('over', ms/60000>lim);
      }
    });
  },1000);
}

/* =====================================================================
   LEADERBOARD
   ===================================================================== */
function rankTeams(baseMap){
  return TEAM_IDS.map(t=>({t, total:teamTotal(t,baseMap)}))
    .sort((a,b)=> b.total-a.total || a.t.localeCompare(b.t));
}
let openLbTeam=null;
function boardHTML(opts){
  opts=opts||{};
  const baseMap=baseByRank();
  const ranked=rankTeams(baseMap);
  const top3=ranked.slice(0,3);
  const order=[top3[1],top3[0],top3[2]]; // 2nd,1st,3rd for podium
  const medals=['🥈','🥇','🥉']; const cls=['p2','p1','p3'];

  let podium='';
  order.forEach((r,i)=>{
    if(!r) return;
    const tm=CONFIG.teams[r.t];
    podium+=`<div class="pod ${cls[i]}"><div class="medal">${medals[i]}</div>
      <div class="pod-name">${esc(tm.name)}</div><div class="pod-score">${r.total} pts</div>
      <div class="bar" style="background:${tm.color}">${r.t}</div></div>`;
  });

  let rows='';
  ranked.forEach((r,i)=>{
    const tm=CONFIG.teams[r.t];
    const bd=teamBreakdown(r.t,baseMap);
    const open=openLbTeam===r.t;
    const clickHandler = opts.spectator ? `onclick="showBrag('${r.t}')"` : `onclick="toggleLb('${r.t}')"`;
    let detail='';
    bd.lines.forEach(l=>{
      const neg=(l.val!=null&&l.val<0);
      detail+=`<div class="lb-line ${neg?'neg':''} ${l.muted?'muted':''}"><span>${l.label}</span><span class="v">${l.val==null?'–':(l.val>0&&l.bonus?'+':'')+l.val}</span></div>`;
    });
    rows+=`<div class="lb-row ${open?'open':''}">
      <button class="lb-main" ${clickHandler}>
        <div class="lb-rank ${i<3?'top':''}">${i+1}</div>
        <div class="lb-badge" style="background:${tm.color}">${r.t}</div>
        <div class="lb-info"><div class="nm">${esc(tm.name)}</div><div class="prog">${esc(tm.taskmaster||'')} · ${bd.done}/7 checkpoints</div></div>
        <div class="lb-total">${r.total}</div>
      </button>

/* =====================================================================
   STATS  (round-wise + fun superlatives, mix of hype & jabs)
   ===================================================================== */
function allElapsed(){
  const list=[];
  TEAM_IDS.forEach(t=>CHALLENGES.forEach(c=>{ const ms=elapsedMs(SCORES[t].ch[c.id]); if(ms!=null) list.push({t, c, ms}); }));
  return list;
}
function computeStats(){
  const baseMap=baseByRank();
  const el=allElapsed();
  const s={ any: el.length>0 };
  // fastest / slowest single round
  if(el.length){
    const fast=el.reduce((a,b)=>b.ms<a.ms?b:a);
    const slow=el.reduce((a,b)=>b.ms>a.ms?b:a);
    s.fastest={team:fast.t, ch:fast.c.name, ms:fast.ms};
    s.slowest={team:slow.t, ch:slow.c.name, ms:slow.ms};
  }
  // per-team aggregates
  const agg={};
  TEAM_IDS.forEach(t=>{
    let hints=0, done=0, totalMs=0, bonusPts=0, subCount=0, beatMod=false;
    CHALLENGES.forEach(c=>{ const cs=SCORES[t].ch[c.id]; hints+=cs.hints||0; const ms=elapsedMs(cs); if(ms!=null){done++; totalMs+=ms;} bonusPts+=challengeBonus(c,cs); });
    const b=SCORES[t].bonus||{sub:{}};
    SUBS.forEach(su=>{ const r=b.sub?.[su.key]; if(su.count) subCount+=(r||0); else if(r) subCount++; });
    if(SCORES[t].ch['c5'].bonusOn) beatMod=true;
    agg[t]={ hints, done, totalMs, bonusPts, subCount, beatMod,
      sarSaved:SCORES[t].ch['c3'].bonus||0, items21:SCORES[t].ch['c6'].bonus||0,
      cc:(b.ccVideos||0), total:teamTotal(t,baseMap) };
  });
  s.agg=agg;
  s.mostHints = pickMax(agg,'hints');
  s.bargain   = pickMax(agg,'sarSaved');
  s.eagle     = pickMax(agg,'items21');
  s.committee = pickMax(agg,'cc');
  s.overachiever = pickMax(agg,'subCount');
  s.modSlayers = TEAM_IDS.filter(t=>agg[t].beatMod);
  // speed king: most checkpoints done, tiebreak fastest total time
  let speed=null;
  TEAM_IDS.forEach(t=>{ const a=agg[t]; if(a.done===0) return;
    if(!speed || a.done>agg[speed].done || (a.done===agg[speed].done && a.totalMs<agg[speed].totalMs)) speed=t; });
  s.speed=speed;
  // zero-hint heroes (only those who've started)
  s.noHints = TEAM_IDS.filter(t=>agg[t].done>0 && agg[t].hints===0);
  s.leader = rankTeams(baseMap)[0];
  return s;
}
function pickMax(agg,key){ let best=null,bv=0; TEAM_IDS.forEach(t=>{ const v=agg[t][key]||0; if(v>bv){bv=v;best=t;} }); return best?{team:best,val:bv}:null; }

function statCard(emoji,label,teamId,detail,extraClass){
  if(!teamId){ return `<div class="stat-card empty-stat ${extraClass||''}"><div class="sc-emoji">${emoji}</div><div class="sc-label">${label}</div><div class="sc-team">—</div><div class="sc-detail" style="color:#c9cfca">not yet</div></div>`; }
  const tm=CONFIG.teams[teamId];
  return `<div class="stat-card ${extraClass||''}"><div class="sc-emoji">${emoji}</div><div class="sc-label">${label}</div>
    <div class="sc-team" style="color:${tm.color}">${esc(tm.name)}</div><div class="sc-detail">${detail||''}</div></div>`;
}
function statsHTML(){
  const s=computeStats();
  if(!s.any){
    return `<div class="stat-hero"><div class="sh-emoji">🏁</div><div class="sh-title">Stats warming up</div><div class="sh-sub">Facts appear as teams finish rounds</div></div>
      <div class="empty">No rounds completed yet — check back once the race is underway. 👀</div>`;
  }
  const leadTm=CONFIG.teams[s.leader.t];
  let cards='';
  cards+=statCard('🏆','Currently leading', s.leader.t, s.leader.total+' pts');
  cards+=statCard('⚡','Speed demons', s.speed, s.speed?(s.agg[s.speed].done+'/7 · '+fmtDur(s.agg[s.speed].totalMs)+' total'):'');
  cards+=statCard('🏁','Fastest round', s.fastest?s.fastest.team:null, s.fastest?(s.fastest.ch+' · '+fmtDur(s.fastest.ms)):'');
  cards+=statCard('🐢','Scenic route (slowest)', s.slowest?s.slowest.team:null, s.slowest?(s.slowest.ch+' · '+fmtDur(s.slowest.ms)):'', 'jab-card');
  cards+=statCard('🙋','Most hints used', s.mostHints?s.mostHints.team:null, s.mostHints?(s.mostHints.val+' hint'+(s.mostHints.val>1?'s':'')+' 😅'):'');
  cards+=statCard('💰','Bargain hunter', s.bargain?s.bargain.team:null, s.bargain?(s.bargain.val+' SAR saved'):'');
  cards+=statCard('🔎','Eagle eye (SAR 21)', s.eagle?s.eagle.team:null, s.eagle?(s.eagle.val+' items'):'');
  cards+=statCard('🎥','Committee hunter', s.committee?s.committee.team:null, s.committee?(s.committee.val+'/7 videos'):'');

  // round-by-round
  const baseMap=baseByRank();
  let rounds='';
  CHALLENGES.forEach((c,i)=>{
    const finished=TEAM_IDS.map(t=>({t, ms:elapsedMs(SCORES[t].ch[c.id])})).filter(x=>x.ms!=null).sort((a,b)=>a.ms-b.ms);
    const medals=['🥇','🥈','🥉'];
    let rrows = finished.length
      ? finished.map((f,idx)=>`<div class="round-row"><span class="rmedal">${medals[idx]||''}</span><span class="rteam" style="color:${CONFIG.teams[f.t].color}">${esc(CONFIG.teams[f.t].name)}</span><span class="rtime">${fmtDur(f.ms)}</span></div>`).join('')
      : `<div class="round-row none">no team has finished this yet</div>`;
    rounds+=`<div class="round-block"><div class="round-head"><div class="rn">${i+1}</div><div class="rt">${c.name}</div></div>${rrows}</div>`;
  });

  const modBrag = s.modSlayers.length ? `<div class="badge-wrap" style="margin-top:10px">${s.modSlayers.map(t=>`<span class="badge hype">🕹️ ${esc(CONFIG.teams[t].name)} beat the mod</span>`).join('')}</div>` : '';
  const brainBrag = s.noHints.length ? `<div class="badge-wrap" style="margin-top:6px">${s.noHints.map(t=>`<span class="badge hype">🧠 ${esc(CONFIG.teams[t].name)} · zero hints</span>`).join('')}</div>` : '';

  return `
    <div class="stat-hero puzzle"><div class="sh-emoji">🔥</div><div class="sh-title" style="color:${leadTm.color}">${esc(leadTm.name)} out front</div><div class="sh-sub">Bragging rights · live</div></div>
    <div class="stat-grid">${cards}</div>
    ${modBrag}${brainBrag}
    <h3 class="display" style="font-size:20px;color:var(--green);margin:18px 0 10px">Round by round</h3>
    ${rounds}`;
}
function renderStats(){
  document.getElementById('view-stats').innerHTML=`
    <h2 class="view-title display">Stats</h2>
    <div class="view-sub">Fun facts & bragging rights</div>
    ${statsHTML()}
    <div class="footer-note">Tap the Board to see full standings</div>`;
}

/* =====================================================================

   ===================================================================== */
function teamBadges(t,s){
  const b=[];
  if(s.leader && s.leader.t===t) b.push({c:'hype',x:'🏆 Frontrunner'});
  if(s.speed===t) b.push({c:'hype',x:'⚡ Speed Demon'});
  if(s.fastest && s.fastest.team===t) b.push({c:'hype',x:'🏁 Fastest Round'});
  if(s.bargain && s.bargain.team===t) b.push({c:'hype',x:'💰 Bargain Hunter'});
  if(s.eagle && s.eagle.team===t) b.push({c:'hype',x:'🔎 Eagle Eye'});
  if(s.committee && s.committee.team===t) b.push({c:'hype',x:'🎥 Committee Hunter'});
  if(s.noHints.includes(t)) b.push({c:'hype',x:'🧠 No Hints'});
  if(s.modSlayers.includes(t)) b.push({c:'hype',x:'🕹️ Mod Slayer'});
  if(s.mostHints && s.mostHints.team===t) b.push({c:'jab',x:'🙋 Hint Enthusiast'});
  if(s.slowest && s.slowest.team===t) b.push({c:'jab',x:'🐢 Scenic Route'});
  return b;
}
function showBrag(t){
  const s=computeStats();
  const baseMap=baseByRank();
  const ranked=rankTeams(baseMap);
  const rank=ranked.findIndex(r=>r.t===t)+1;
  const tm=CONFIG.teams[t]; const a=s.agg?s.agg[t]:null;
  const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'#'+rank;
  const badges=s.any?teamBadges(t,s):[];
  const badgeHTML = badges.length ? `<div class="badge-wrap" style="justify-content:center">${badges.map(x=>`<span class="badge ${x.c}">${x.x}</span>`).join('')}</div>` : `<div class="brag-foot">Badges unlock as you play 🔓</div>`;
  const wrap=document.getElementById('bragCardWrap');
  wrap.innerHTML=`
    <div class="brag-card">
      <div class="brag-top puzzle" style="background:${tm.color}">
        <div class="bt-quest">The 21° Quest · Jeddah Park</div>
        <div class="bt-name">${esc(tm.name)}</div>
        <div class="bt-rank">${medal} Rank ${rank} of 5</div>
      </div>
      <div class="brag-body">

        <div class="brag-stats">
          <div class="brag-stat"><div class="n">${a?a.done:0}/7</div><div class="l">checkpoints</div></div>
          <div class="brag-stat"><div class="n">${a?fmtDur(a.totalMs):'0:00'}</div><div class="l">time on course</div></div>

        </div>

      </div>
    </div>
    <div class="brag-tip">📸 Screenshot this and drop it in the group chat</div>`;
  document.getElementById('bragBack').classList.add('show');
}

/* =====================================================================
   HELPERS
   ===================================================================== */
function clampN(n,lo,hi){ return Math.max(lo,Math.min(hi,n)); }
let _modalFn=null;
function openConfirm(title,body,confirmLabel,fn){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').textContent=body;
  document.getElementById('modalConfirm').textContent=confirmLabel||'Confirm';
  _modalFn=fn;
  document.getElementById('modalBack').classList.add('show');
}
function closeModal(){ document.getElementById('modalBack').classList.remove('show'); _modalFn=null; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fmtDur(ms){ if(ms==null)return '00:00'; const s=Math.floor(ms/1000); const m=Math.floor(s/60); const ss=s%60; return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0'); }
function fmtClock(ts){ const d=new Date(ts); let h=d.getHours(), m=d.getMinutes(); const ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+String(m).padStart(2,'0')+' '+ap; }
function toTimeInput(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600); }
